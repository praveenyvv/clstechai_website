
<style>
  .dash { padding: 1rem 0; font-family: var(--font-sans, system-ui, sans-serif); }
  .section-label { font-size: 13px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 12px; }
  .sr-only { position:absolute;left:-9999px; }
  .controls { display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap; }
  .ctrl-btn { font-size:13px;font-weight:500;padding:6px 14px;cursor:pointer;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);transition:all .15s; }
  .ctrl-btn:hover { background:var(--color-background-secondary); }
  .ctrl-btn.active { background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary); }
  .last-update { font-size:12px;color:var(--color-text-tertiary);margin-left:auto;font-style:italic; }
  .cards { display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:2rem; }
  .card { background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 18px;position:relative;transition:transform .2s;display:flex;flex-direction:column; }
  .card:hover { transform:translateY(-2px); }
  .card-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px; }
  .beacon-name { font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0; }
  .beacon-id { font-size:10px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:3px 6px;border-radius:4px;margin:0; }
  .val-wrapper { display:flex;align-items:baseline;gap:6px;margin-bottom:10px; }
  .val-value { font-size:32px;font-weight:500;margin:0;line-height:1;letter-spacing:-0.02em; }
  .val-unit { font-size:12px;color:var(--color-text-secondary); }
  .status-row { display:flex;align-items:center;font-size:12px;color:var(--color-text-secondary);margin-top:auto;padding-top:10px;border-top:0.5px dashed var(--color-border-tertiary); }
  .status-dot { width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px; }
  .trend { margin-left:auto;font-size:12px;font-weight:500;background:var(--color-background-secondary);padding:2px 6px;border-radius:6px; }
  .heatmap-wrap { background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:2rem; }
  .heatmap-grid { display:grid;grid-template-columns:64px repeat(12,1fr);gap:4px;align-items:center; }
  .hm-label { font-size:12px;font-weight:500;color:var(--color-text-secondary);text-align:right;padding-right:12px; }
  .hm-time { font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-bottom:4px; }
  .hm-cell { height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:default;transition:transform .15s; }
  .hm-cell:hover { transform:scale(1.06);z-index:10; }
  .legend { display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:var(--color-text-secondary); }
  .legend-bar { display:flex;gap:2px; }
  .legend-swatch { width:18px;height:10px;border-radius:2px; }
  .chart-wrap { background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:2rem; }
  .divider { border:none;border-top:0.5px solid var(--color-border-tertiary);margin:2rem 0; }
  .section-block-title { font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0 0 4px; }
  .section-block-sub { font-size:12px;color:var(--color-text-tertiary);margin:0 0 1.25rem; }
</style>

<div class="dash" style="padding:1rem 1.5rem;">
  <h2 class="sr-only">DRL Operations Dashboard — Temperature and Flow Monitoring</h2>

  <div class="controls">
    <span style="font-size:14px;font-weight:500;color:var(--color-text-primary);">BLE Beacon Monitor</span>
    <div style="width:1px;height:20px;background:var(--color-border-tertiary);margin:0 6px;"></div>
    <button class="ctrl-btn active" onclick="setUnit('C',this)">°C</button>
    <button class="ctrl-btn" onclick="setUnit('F',this)">°F</button>
    <button class="ctrl-btn" style="margin-left:4px" onclick="simulateFetch()">↻ Refresh</button>
    <span class="last-update" id="last-update">Connecting…</span>
  </div>

  <!-- ── TEMPERATURE ── -->
  <p class="section-label">Temperature — live readings</p>
  <div class="cards" id="cards"></div>

  <p class="section-label">Temperature — heat map (last 12)</p>
  <div class="heatmap-wrap">
    <div class="heatmap-grid" id="heatmap"></div>
    <div class="legend">
      <span>Cool</span>
      <div class="legend-bar" id="legend-bar"></div>
      <span>Hot</span>
    </div>
  </div>

  <p class="section-label">Temperature — trend</p>
  <div class="chart-wrap">
    <div style="position:relative;width:100%;height:240px;">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <hr class="divider">

  <!-- ── FLOW METERS ── -->
  <p class="section-label">Flow meters — live readings</p>
  <div class="cards" id="flow-cards"></div>

  <p class="section-label">Flow meters — heat map (last 12)</p>
  <div class="heatmap-wrap">
    <div class="heatmap-grid" id="flow-heatmap"></div>
    <div class="legend">
      <span>Low</span>
      <div class="legend-bar" id="flow-legend-bar"></div>
      <span>High</span>
    </div>
  </div>

  <p class="section-label">Flow meters — trend</p>
  <div class="chart-wrap">
    <div style="position:relative;width:100%;height:220px;">
      <canvas id="flowChart"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>

<script>
const BEACONS = [
  { id:'B-001', name:'Zone A', mac:'AA:BB:CC:01' },
  { id:'B-002', name:'Zone B', mac:'AA:BB:CC:02' },
  { id:'B-003', name:'Zone C', mac:'AA:BB:CC:03' },
  { id:'B-004', name:'Zone D', mac:'AA:BB:CC:04' },
  { id:'B-005', name:'Zone E', mac:'AA:BB:CC:05' },
];

const FLOW_METERS = [
  { id:'ETp-1', name:'ETp-1', mac:'FM:01', label:'Effluent Transfer — Line 1' },
  { id:'ETp-2', name:'ETp-2', mac:'FM:02', label:'Effluent Transfer — Line 2' },
];

const TEMP_COLORS  = ['#378ADD','#1D9E75','#EF9F27','#D4537E','#7F77DD'];
const FLOW_COLORS  = ['#0FA3B1','#E76F51'];

const FLOW_UNIT    = 'L/min';
const FLOW_MIN     = 0;
const FLOW_MAX     = 120;
const FLOW_WARN    = 90;   // high-flow threshold
const FLOW_LOW     = 10;   // low-flow / stall threshold

let unit = 'C';
let tempHistory = BEACONS.map(() => []);
let flowHistory = FLOW_METERS.map(() => []);
let trendChart  = null;
let flowChart   = null;

function toUnit(c) { return unit === 'C' ? c : c * 9/5 + 32; }
function fmtTemp(c) { return toUnit(c).toFixed(1) + '°' + unit; }
function fmtFlow(v) { return v.toFixed(1) + ' ' + FLOW_UNIT; }

function heatColor(norm) {
  const stops = [[59,130,246],[34,197,94],[250,204,21],[249,115,22],[239,68,68]];
  const n = Math.max(0, Math.min(1, norm));
  const idx = n * (stops.length - 1);
  const lo = stops[Math.floor(idx)], hi = stops[Math.ceil(idx)];
  const t = idx - Math.floor(idx);
  const r = Math.round(lo[0]+(hi[0]-lo[0])*t), g = Math.round(lo[1]+(hi[1]-lo[1])*t), b = Math.round(lo[2]+(hi[2]-lo[2])*t);
  return { bg:`rgb(${r},${g},${b})`, text: n>0.6||n<0.2 ? '#fff' : '#1a1a1a' };
}

function flowHeatColor(norm) {
  const stops = [[219,234,254],[147,197,253],[59,130,246],[29,78,216],[30,27,75]];
  const n = Math.max(0, Math.min(1, norm));
  const idx = n * (stops.length - 1);
  const lo = stops[Math.floor(idx)], hi = stops[Math.ceil(idx)];
  const t = idx - Math.floor(idx);
  const r = Math.round(lo[0]+(hi[0]-lo[0])*t), g = Math.round(lo[1]+(hi[1]-lo[1])*t), b = Math.round(lo[2]+(hi[2]-lo[2])*t);
  return { bg:`rgb(${r},${g},${b})`, text: n>0.55 ? '#fff' : '#1a1a1a' };
}

function buildLegend(id, colorFn) {
  const bar = document.getElementById(id);
  bar.innerHTML = '';
  for (let i = 0; i <= 10; i++) {
    const c = colorFn(i / 10);
    const s = document.createElement('div');
    s.className = 'legend-swatch'; s.style.background = c.bg;
    bar.appendChild(s);
  }
}

function getTimeLabels(n, intervalMs) {
  return Array.from({length:n}, (_,i) => {
    const d = new Date(Date.now() - (n-1-i) * intervalMs);
    return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  });
}

// ── TEMPERATURE ──────────────────────────────────────
function renderTempCards(data) {
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  data.forEach((d,i) => {
    const prev = tempHistory[i].length >= 2 ? tempHistory[i][tempHistory[i].length-2] : d.tempC;
    const delta = d.tempC - prev;
    const trend = Math.abs(delta) < 0.3 ? '→' : delta > 0 ? '↑' : '↓';
    const trendCol = Math.abs(delta) < 0.3 ? 'var(--color-text-secondary)' : delta > 0 ? '#EF9F27' : '#378ADD';
    const ok = d.tempC < 38;
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-header">
        <span class="beacon-name">${d.name}</span>
        <span class="beacon-id">${d.mac}</span>
      </div>
      <div class="val-wrapper">
        <span class="val-value" style="color:${TEMP_COLORS[i]}">${fmtTemp(d.tempC)}</span>
        <span class="val-unit">${unit==='C'?'Celsius':'Fahrenheit'}</span>
      </div>
      <div class="status-row">
        <span class="status-dot" style="background:${ok?'#1D9E75':'#E24B4A'}"></span>
        <span style="color:${ok?'var(--color-text-secondary)':'#E24B4A'};font-weight:${ok?'400':'500'}">${ok?'Normal':'High temp'}</span>
        <span class="trend" style="color:${trendCol}">${trend} ${Math.abs(toUnit(d.tempC)-toUnit(prev)).toFixed(1)}°</span>
      </div>`;
    wrap.appendChild(div);
  });
}

function renderTempHeatmap() {
  const wrap = document.getElementById('heatmap');
  wrap.innerHTML = '';
  const times = getTimeLabels(12, 30000);
  wrap.appendChild(document.createElement('div'));
  times.forEach(t => {
    const el = document.createElement('div'); el.className = 'hm-time'; el.textContent = t; wrap.appendChild(el);
  });
  BEACONS.forEach((b,bi) => {
    const lbl = document.createElement('div'); lbl.className = 'hm-label'; lbl.textContent = b.name; wrap.appendChild(lbl);
    const row = tempHistory[bi].slice(-12);
    while (row.length < 12) row.unshift(null);
    row.forEach(v => {
      const cell = document.createElement('div'); cell.className = 'hm-cell';
      if (v !== null) {
        const {bg,text} = heatColor((v-20)/25);
        cell.style.background = bg; cell.style.color = text;
        cell.textContent = Math.round(toUnit(v));
        cell.title = `${b.name}: ${fmtTemp(v)}`;
      } else { cell.style.background = 'var(--color-background-secondary)'; }
      wrap.appendChild(cell);
    });
  });
}

function renderTempChart() {
  const labels = getTimeLabels(12, 30000);
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const threshVal = parseFloat(toUnit(38).toFixed(1));
  const datasets = BEACONS.map((b,i) => ({
    label: b.name,
    data: tempHistory[i].slice(-12).map(v => parseFloat(toUnit(v).toFixed(1))),
    borderColor: TEMP_COLORS[i], backgroundColor: TEMP_COLORS[i]+'18',
    borderWidth:2, pointRadius:4, pointHoverRadius:7, tension:0.4, fill:false,
  }));
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type:'line', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:true, position:'top', labels:{ usePointStyle:true, boxWidth:8, font:{size:12}, color:isDark?'#b4b2a9':'#5f5e5a' } },
        tooltip:{ backgroundColor:isDark?'rgba(0,0,0,0.85)':'rgba(255,255,255,0.95)', titleColor:isDark?'#fff':'#111', bodyColor:isDark?'#ccc':'#444', borderColor:isDark?'#333':'#eee', borderWidth:1, padding:10, usePointStyle:true },
        annotation:{ annotations:{ dangerZone:{ type:'line', yMin:threshVal, yMax:threshVal, borderColor:'rgba(226,75,74,0.55)', borderWidth:2, borderDash:[6,4], label:{ display:true, content:`High temp (${threshVal.toFixed(0)}°${unit})`, position:'end', backgroundColor:'rgba(226,75,74,0.9)', color:'#fff', font:{size:10,weight:'bold'}, padding:4 } } } }
      },
      scales:{
        x:{ ticks:{font:{size:11},color:isDark?'#888780':'#999'}, grid:{display:false} },
        y:{ ticks:{font:{size:11},color:isDark?'#888780':'#999', callback:v=>v+'°'}, grid:{color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)',borderDash:[4,4]} }
      }
    }
  });
}

// ── FLOW METERS ──────────────────────────────────────
function renderFlowCards(data) {
  const wrap = document.getElementById('flow-cards');
  wrap.innerHTML = '';
  data.forEach((d,i) => {
    const prev = flowHistory[i].length >= 2 ? flowHistory[i][flowHistory[i].length-2] : d.flow;
    const delta = d.flow - prev;
    const trend = Math.abs(delta) < 0.5 ? '→' : delta > 0 ? '↑' : '↓';
    const trendCol = Math.abs(delta) < 0.5 ? 'var(--color-text-secondary)' : delta > 0 ? '#EF9F27' : '#378ADD';
    const isHigh = d.flow > FLOW_WARN;
    const isLow  = d.flow < FLOW_LOW;
    const statusOk = !isHigh && !isLow;
    const statusText = isHigh ? 'High flow' : isLow ? 'Low / stall' : 'Normal';
    const statusColor = isHigh ? '#E24B4A' : isLow ? '#EF9F27' : '#1D9E75';
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-header">
        <span class="beacon-name">${d.name}</span>
        <span class="beacon-id">${d.id}</span>
      </div>
      <div class="val-wrapper">
        <span class="val-value" style="color:${FLOW_COLORS[i]}">${fmtFlow(d.flow)}</span>
      </div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;">${d.label}</div>
      <div class="status-row">
        <span class="status-dot" style="background:${statusColor}"></span>
        <span style="color:${statusColor};font-weight:${statusOk?'400':'500'}">${statusText}</span>
        <span class="trend" style="color:${trendCol}">${trend} ${Math.abs(d.flow - prev).toFixed(1)} L/min</span>
      </div>`;
    wrap.appendChild(div);
  });
}

function renderFlowHeatmap() {
  const wrap = document.getElementById('flow-heatmap');
  wrap.innerHTML = '';
  const times = getTimeLabels(12, 30000);
  wrap.appendChild(document.createElement('div'));
  times.forEach(t => {
    const el = document.createElement('div'); el.className = 'hm-time'; el.textContent = t; wrap.appendChild(el);
  });
  FLOW_METERS.forEach((fm,fi) => {
    const lbl = document.createElement('div'); lbl.className = 'hm-label'; lbl.textContent = fm.id; wrap.appendChild(lbl);
    const row = flowHistory[fi].slice(-12);
    while (row.length < 12) row.unshift(null);
    row.forEach(v => {
      const cell = document.createElement('div'); cell.className = 'hm-cell';
      if (v !== null) {
        const {bg,text} = flowHeatColor((v - FLOW_MIN) / (FLOW_MAX - FLOW_MIN));
        cell.style.background = bg; cell.style.color = text;
        cell.textContent = Math.round(v);
        cell.title = `${fm.id}: ${fmtFlow(v)}`;
      } else { cell.style.background = 'var(--color-background-secondary)'; }
      wrap.appendChild(cell);
    });
  });
}

function renderFlowChart() {
  const labels = getTimeLabels(12, 30000);
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const datasets = FLOW_METERS.map((fm,i) => ({
    label: fm.id,
    data: flowHistory[i].slice(-12).map(v => parseFloat(v.toFixed(1))),
    borderColor: FLOW_COLORS[i], backgroundColor: FLOW_COLORS[i]+'18',
    borderWidth:2, pointRadius:4, pointHoverRadius:7, tension:0.4, fill:false,
  }));
  if (flowChart) flowChart.destroy();
  flowChart = new Chart(document.getElementById('flowChart'), {
    type:'line', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:true, position:'top', labels:{ usePointStyle:true, boxWidth:8, font:{size:12}, color:isDark?'#b4b2a9':'#5f5e5a' } },
        tooltip:{ backgroundColor:isDark?'rgba(0,0,0,0.85)':'rgba(255,255,255,0.95)', titleColor:isDark?'#fff':'#111', bodyColor:isDark?'#ccc':'#444', borderColor:isDark?'#333':'#eee', borderWidth:1, padding:10, usePointStyle:true },
        annotation:{ annotations:{
          highWarn:{ type:'line', yMin:FLOW_WARN, yMax:FLOW_WARN, borderColor:'rgba(226,75,74,0.55)', borderWidth:2, borderDash:[6,4], label:{ display:true, content:`High flow (${FLOW_WARN} L/min)`, position:'end', backgroundColor:'rgba(226,75,74,0.9)', color:'#fff', font:{size:10,weight:'bold'}, padding:4 } },
          lowWarn:{ type:'line', yMin:FLOW_LOW, yMax:FLOW_LOW, borderColor:'rgba(239,159,39,0.55)', borderWidth:2, borderDash:[6,4], label:{ display:true, content:`Low / stall (${FLOW_LOW} L/min)`, position:'start', backgroundColor:'rgba(239,159,39,0.9)', color:'#fff', font:{size:10,weight:'bold'}, padding:4 } }
        }}
      },
      scales:{
        x:{ ticks:{font:{size:11},color:isDark?'#888780':'#999'}, grid:{display:false} },
        y:{ min:0, max:FLOW_MAX+10, ticks:{font:{size:11},color:isDark?'#888780':'#999', callback:v=>v+' L/m'}, grid:{color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)',borderDash:[4,4]} }
      }
    }
  });
}

// ── FETCH / SIM ──────────────────────────────────────
async function simulateFetch() {
  document.getElementById('last-update').textContent = 'Fetching…';

  const tempData = BEACONS.map((b,i) => {
    const last = tempHistory[i].length ? tempHistory[i][tempHistory[i].length-1] : null;
    const tempC = last !== null ? Math.max(20, Math.min(45, last + (Math.random()-0.45)*3)) : 20 + Math.random()*25;
    return { ...b, tempC };
  });
  tempData.forEach((d,i) => tempHistory[i].push(d.tempC));
  renderTempCards(tempData);
  renderTempHeatmap();
  renderTempChart();

  const flowData = FLOW_METERS.map((fm,i) => {
    const last = flowHistory[i].length ? flowHistory[i][flowHistory[i].length-1] : null;
    const flow = last !== null ? Math.max(0, Math.min(FLOW_MAX, last + (Math.random()-0.45)*8)) : 30 + Math.random()*40;
    return { ...fm, flow };
  });
  flowData.forEach((d,i) => flowHistory[i].push(d.flow));
  renderFlowCards(flowData);
  renderFlowHeatmap();
  renderFlowChart();

  document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function setUnit(u, btn) {
  unit = u;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  simulateFetch();
}

buildLegend('legend-bar', heatColor);
buildLegend('flow-legend-bar', flowHeatColor);
simulateFetch();
setInterval(simulateFetch, 10000);
</script>
